spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/storeshield
    username: postgres
    password: ${DB_PASSWORD}
    driver-class: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format-sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect